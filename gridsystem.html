<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid System</title>
    <!-- CSS only -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <style>
      [class*="col"] {
        padding: 1rem;
        background-color: #33b5e5;
        border: 2px solid #fff;
        color: #fff;
      }
      .child {
        background-color: #2041d3;
      }
    </style>
  </head>
  <body>
    <div class="container border">Content</div>
    <br /><br />

    <!-- The grid system -->
    <div class="row">
      <div class="col-1">1</div>
      <div class="col-12">2</div>
      <div class="col">3</div>
      <div class="col-8">4</div>
    </div>
    <br />
    <div class="row">
      <div class="col">1</div>
      <div class="col">2</div>
      <div class="col-6">3</div>
      <div class="col">4</div>
    </div>
    <br /><br /><br />



    <!-- Some more  -->
    <div class="row">
      <div class="col-sm"></div> <!--full width below small else takes 1 unit-->
      <div class="col-sm"></div>
      <div class="col-sm"></div>
      <div class="col-sm"></div>
    </div>
    <br><br>

    <div class="row">
      <div class="col-md-4"></div>  <!--Max three rows after medium-->
      <div class="col-md-4"></div>
      <div class="col-md-4"></div>
      <div class="col-md-4"></div>
    </div>
    <br><br>
    <!-- Multiple col-classes -->
    <div class="container my-10 mx-0">
      <div class="row">
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
        <div class="col-xxl-1 col-xl-2 cl-l-3 col-md-4 col-sm-6"></div>
      </div>
    </div>
     <br><br>


    <!-- Row columns -->
     <div class="row row-cols-1"> <!--Each row can contain 1 col-->
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
     </div>
     <br><br>
     <div class="row row-cols-4">  <!--Each row can contain 4 col-->
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
     </div>
     <br><br>
     <div class="row row-cols-1 row-cols-xl-6 row-cols-md-3 row-cols-sm-2">
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
       <div class="col"></div>
     </div>
 
     <br><br>
     <div class="container">
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4">
        <div class="col">Column</div>
        <div class="col">Column</div>
        <div class="col">Column</div>
        <div class="col">Column</div>
      </div>
    </div>
    <br><br>
    <!-- Ordering -->
    <div class="container">
      <div class="row">
        <div class="col order-last">
          First in DOM, ordered last
        </div>
        <div class="col">
          Second in DOM, unordered
        </div>
        <div class="col order-first">
          Third in DOM, ordered first
        </div>
      </div>
    </div>
    <!-- JavaScript Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
